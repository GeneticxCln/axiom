---
# Axiom Compositor — Flatpak manifest (Phase 4)
#
# Build:
#   flatpak-builder --user --install build-dir packaging/flatpak/org.axiom.Compositor.yml --force-clean
#
# Run:
#   flatpak run org.axiom.Compositor --windowed
#
# For standalone DRM mode, run outside the sandbox or grant full device access:
#   flatpak run --device=all org.axiom.Compositor

app-id: org.axiom.Compositor
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: axiom

finish-args:
  # Wayland compositor protocol
  - --socket=wayland
  # Fallback X11 socket for nested mode
  - --socket=x11
  # D-Bus session bus (logind/seatd, rtkit)
  - --socket=session-bus
  # DRM/KMS device nodes for standalone mode
  - --device=dri
  # Input device nodes (libinput)
  - --device=input
  # XWayland socket path (needed to create /tmp/.X11-unix/X*)
  - --filesystem=/tmp/.X11-unix:create
  # Shared memory (SHM buffers)
  - --share=ipc
  # Network access (XWayland clients may need it)
  - --share=network
  # System D-Bus for logind seat management
  - --system-talk-name=org.freedesktop.login1
  # PulseAudio/PipeWire socket for audio
  - --socket=pulseaudio

modules:
  - name: axiom
    buildsystem: simple
    build-commands:
      # Build in release mode with full Wayland protocol support
      - cargo build --release
      # Install binary
      - install -Dm755 target/release/axiom /app/bin/axiom
      # Install config
      - install -Dm644 config/axiom.toml /app/etc/axiom/config.toml
      # Install desktop entries
      - install -Dm644 packaging/axiom.desktop /app/share/applications/org.axiom.Compositor.desktop
      - install -Dm644 packaging/axiom-wayland.desktop /app/share/wayland-sessions/axiom.desktop
      # Install session wrapper
      - install -Dm755 packaging/axiom-session /app/bin/axiom-session
      # Install icon (placeholder SVG)
      - mkdir -p /app/share/icons/hicolor/scalable/apps
      - |
        cat > /app/share/icons/hicolor/scalable/apps/org.axiom.Compositor.svg << 'SVGEOF'
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
          <rect width="128" height="128" rx="16" fill="#1a1a2e"/>
          <rect x="16" y="16" width="96" height="96" rx="8" fill="#16213e"/>
          <rect x="20" y="20" width="88" height="88" rx="4" fill="#0f3460"/>
          <text x="64" y="76" text-anchor="middle" font-size="36" font-family="sans-serif"
                fill="#e94560" font-weight="bold">AX</text>
        </svg>
        SVGEOF
      # Install metainfo
      - |
        cat > /app/share/metainfo/org.axiom.Compositor.metainfo.xml << 'XMLEOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <component type="desktop-application">
          <id>org.axiom.Compositor</id>
          <name>Axiom Compositor</name>
          <summary>Hybrid Wayland compositor with scrollable workspaces</summary>
          <metadata_license>CC0-1.0</metadata_license>
          <project_license>GPL-3.0</project_license>
          <description>
            <p>Axiom is an alpha-stage hybrid Wayland compositor combining
            scrollable workspaces (inspired by niri) with GPU-accelerated
            visual effects (blur, shadows, animations). Supports nested
            (windowed) and standalone DRM/KMS display server modes.</p>
          </description>
          <launchable type="desktop-id">org.axiom.Compositor.desktop</launchable>
          <url type="homepage">https://github.com/GeneticxCln/axiom</url>
          <screenshots>
            <screenshot type="default">
              <caption>Axiom compositor with SSD decorations</caption>
            </screenshot>
          </screenshots>
          <categories>
            <category>System</category>
          </categories>
          <releases>
            <release version="0.1.0" date="2026-07-19">
              <description>
                <p>Alpha release with SSD rendering, DRM GBM path,
                incremental multi-monitor hotplug, and process sandboxing.</p>
              </description>
            </release>
          </releases>
        </component>
        XMLEOF
    sources:
      - type: dir
        path: ../../
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/axiom/cargo
