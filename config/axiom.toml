[backend]
kind = "winit"

[features]
enable_minimize = false
enable_xdg_decoration_protocol = false

[general]
debug = false
max_fps = 60
vsync = true

[workspace]
scroll_speed = 1.0
infinite_scroll = true
auto_scroll = true
workspace_width = 1920
gaps = 10
smooth_scrolling = true
momentum_friction = 0.95
momentum_min_velocity = 1.0
snap_threshold_px = 100.0

[effects]
enabled = true

[effects.animations]
enabled = true
duration = 300
curve = "ease-out"
workspace_transition = 250
window_animation = 200

[effects.blur]
enabled = true
radius = 10
intensity = 0.8
window_backgrounds = true

[effects.rounded_corners]
enabled = true
radius = 8
antialiasing = 2

[effects.shadows]
enabled = true
size = 20
blur_radius = 10
opacity = 0.6
color = "#000000"

[window]
placement = "smart"
focus_follows_mouse = false
border_width = 2
active_border_color = "#5294e2"
inactive_border_color = "#333333"
gap = 10
default_layout = "horizontal"

[input]
keyboard_repeat_delay = 600
keyboard_repeat_rate = 25
mouse_accel = 0.0
touchpad_tap = true
natural_scrolling = false

[bindings]
scroll_left = "Super+Left"
scroll_right = "Super+Right"
move_window_left = "Super+Shift+Left"
move_window_right = "Super+Shift+Right"
close_window = "Super+q"
toggle_fullscreen = "Super+f"
toggle_floating = "Super+Shift+Space"
toggle_minimize = "Super+grave"
launch_terminal = "Super+Return"
launch_launcher = "Super+Space"
toggle_effects = "Super+e"
quit = "Super+Shift+q"
mouse_back = "scroll_left"
mouse_forward = "scroll_right"
mouse_middle = "toggle_floating"

[xwayland]
enabled = true
display = 2
