# Axiom Configuration File
# The hybrid Wayland compositor combining scrollable workspaces with visual effects

[workspace]
scroll_speed = 1.0
infinite_scroll = true
auto_scroll = true
workspace_width = 1920
gaps = 10
smooth_scrolling = true

[effects]
enabled = true

[effects.animations]
enabled = true
duration = 300
curve = "ease-out"
workspace_transition = 250
window_animation = 200

[effects.blur]
enabled = true
radius = 10
intensity = 0.8
window_backgrounds = true

[effects.rounded_corners]
enabled = true
radius = 8
antialiasing = 2

[effects.shadows]
enabled = true
size = 20
blur_radius = 15
opacity = 0.6
color = "#000000"

[window]
placement = "smart"
focus_follows_mouse = false
border_width = 2
active_border_color = "#7C3AED"
inactive_border_color = "#374151"
gap = 10

[input]
keyboard_repeat_delay = 600
keyboard_repeat_rate = 25
mouse_accel = 0.0
touchpad_tap = true
natural_scrolling = true

[bindings]
scroll_left = "Super+Left"
scroll_right = "Super+Right"
move_window_left = "Super+Shift+Left"
move_window_right = "Super+Shift+Right"
close_window = "Super+q"
toggle_fullscreen = "Super+f"
toggle_floating = "Super+Shift+Space"
# Toggle the focused window's minimized state. No-op while
# `[features].enable_minimize = false` below; once flipped to
# `true` it routes through the titlebar minimize button as well.
toggle_minimize = "Super+grave"
launch_terminal = "Super+Enter"
launch_launcher = "Super+Space"
toggle_effects = "Super+e"
quit = "Super+Shift+q"

[xwayland]
enabled = true

[general]
debug = false
max_fps = 60
vsync = true

# Feature kill-switches for features deliberately *minimized* to keep the
# implementation surface focused. Both default to `false` so out-of-the-box
# Axiom does NOT:
#   1. draw / click-handle a minimize titlebar button (Wayland has no
#      standard minimize protocol; supporting it well requires deeper
#      synthetic-surface plumbing deferred to a follow-up PR).
#   2. expose `zxdg_decoration_manager_v1` for client SSD/CSD negotiation
#      (we unilaterally render internal SSDs via DecorationManager; the
#      proper protocol handler is deferred to a follow-up PR).
# Flip either to `true` to opt back in (the matching implementation must
# already exist or the flag is currently a no-op).
[features]
enable_minimize = false
enable_xdg_decoration_protocol = false
