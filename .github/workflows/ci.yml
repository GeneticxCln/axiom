name: Axiom CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable
          - beta
          - nightly
        features:
          - ""  # no features → default
          - "examples"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config \
          xvfb
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo index
      uses: actions/cache@v4  
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: cargo fmt -- --check
      
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      
    - name: Run unit tests
      run: |
        # Run unit tests with single thread to avoid wgpu parallelism races
        cargo test --lib --verbose --all-features -- --test-threads=1
        
    - name: Run property tests
      run: |
        # Run property-based tests for configuration and workspace modules
        cargo test --lib property_tests --verbose --all-features
        
    - name: Run integration tests
      run: |
        # Test IPC communication with virtual display for graphics operations
        xvfb-run -a cargo test --test integration_tests --all-features

    - name: Run ignored tests (Winit/GL, needs display)
      run: |
        xvfb-run -a cargo test --test pixel_render --test screencopy_test --all-features -- --ignored --nocapture

    - name: Build release binary
      run: cargo build --release --verbose
      
    - name: Test release binary
      run: |
        # Fail the job if the release binary cannot print help
        ./target/release/axiom --help
        

  feature-off-test:
    name: Feature-off Test Suite
    runs-on: ubuntu-latest
    # Validates compilation and tests under --no-default-features
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config \
          xvfb

    - name: Cache cargo registry + index + build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-build-no-defaults-${{ hashFiles('**/Cargo.lock') }}

    - name: Run unit tests (no default features)
      run: |
        cargo test --lib --no-default-features -- --test-threads=1

    - name: Run integration tests (no default features)
      run: |
        xvfb-run -a cargo test --test integration_tests --no-default-features

    - name: Build release binary (no default features)
      run: |
        cargo build --release --no-default-features
        ./target/release/axiom --help

  nested-smoke:
    name: Nested Smoke Test Matrix
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config \
          xvfb \
          weston \
          foot

    - name: Build debug binary
      run: cargo build --bin axiom

    - name: Run nested smoke test matrix
      run: |
        chmod +x scripts/nested_smoke_test.sh
        # MATRIX_MODE is an env var (not a positional arg). Positional $1 is the binary path.
        AXIOM_SMOKE_MATRIX=true xvfb-run -a scripts/nested_smoke_test.sh ./target/debug/axiom

  performance:
    name: Performance Benchmarks  
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config \
          xvfb

    - name: Restore baseline cache
      id: cache-baseline
      uses: actions/cache@v4
      with:
        path: target/criterion
        key: benchmark-baseline-main-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          benchmark-baseline-main-

    - name: Run benchmarks (baseline comparison on PR)
      run: |
        if [ "${{ github.ref_name }}" = "main" ]; then
          # On main: save new baseline
          xvfb-run -a cargo bench --all-features -- --save-baseline ci-main
        elif [ -f "target/criterion/ci-main/baseline" ]; then
          # On PR with cached baseline: compare
          xvfb-run -a cargo bench --all-features -- --baseline ci-main 2>&1 | tee target/criterion/comparison.log
          # Check for regressions (Criterion exits 0 even with regressions, so parse output)
          if grep -qi "regression\|performance has (regressed\|became worse" target/criterion/comparison.log; then
            echo "::warning title=Performance Regressions detected::Benchmark regressions found. See comparison.log for details."
          fi
        else
          # No baseline available: run without comparison
          xvfb-run -a cargo bench --all-features -- --noplot
        fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked
      
    - name: Install cargo-deny
      run: cargo install cargo-deny --locked
      
    - name: Run security checks
      # Use the repo wrapper so local and CI gates stay aligned and failures fail the job.
      run: bash ./scripts/check_security.sh all

  package:
    name: Build & Verify Package
    runs-on: ubuntu-latest
    # Package only when the hard quality gates pass (not just unit/integration).
    needs: [test, nested-smoke, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config
    
    - name: Build release binary
      run: cargo build --release --all-features
    
    - name: Validate session wrapper syntax
      run: bash -n packaging/axiom-session
    
    - name: Build package tarball
      run: |
        PKG_DIR="axiom-v0.1.0-alpha.1-linux-amd64"
        mkdir -p "$PKG_DIR/usr/bin"
        mkdir -p "$PKG_DIR/usr/share/applications"
        mkdir -p "$PKG_DIR/usr/share/wayland-sessions"
        mkdir -p "$PKG_DIR/usr/share/icons/hicolor/scalable/apps"
        mkdir -p "$PKG_DIR/usr/share/doc/axiom"
        mkdir -p "$PKG_DIR/usr/share/axiom"
        mkdir -p "$PKG_DIR/etc/axiom"
        
        cp target/release/axiom "$PKG_DIR/usr/bin/"
        cp packaging/axiom-session "$PKG_DIR/usr/bin/"
        cp packaging/axiom.desktop "$PKG_DIR/usr/share/applications/"
        cp packaging/axiom-wayland.desktop "$PKG_DIR/usr/share/wayland-sessions/axiom.desktop"
        cp assets/logo.svg "$PKG_DIR/usr/share/icons/hicolor/scalable/apps/axiom.svg"
        cp config/axiom.toml "$PKG_DIR/usr/share/axiom/"
        cp config/axiom.toml "$PKG_DIR/etc/axiom/"
        cp README.md "$PKG_DIR/usr/share/doc/axiom/"
        cp LICENSE "$PKG_DIR/usr/share/doc/axiom/"
        
        tar czf "${PKG_DIR}.tar.gz" "$PKG_DIR"
        echo "Package size: $(du -sh "${PKG_DIR}.tar.gz" | cut -f1)"
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: axiom-linux-amd64
        path: axiom-v*.tar.gz
        retention-days: 90
        
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwayland-dev \
          libxkbcommon-dev \
          libegl1-mesa-dev \
          pkg-config \
          jq
    
    - name: Install tarpaulin
      run: cargo install cargo-tarpaulin
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: coverage-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          coverage-${{ runner.os }}-cargo-
      
    - name: Run coverage analysis
      run: |
        # Use our custom coverage script
        chmod +x scripts/coverage.sh
        ./scripts/coverage.sh unit
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./target/tarpaulin/unit/cobertura.xml
        flags: unittests
        name: axiom-coverage
        fail_ci_if_error: false
    
    - name: Archive coverage results
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: target/tarpaulin/
        retention-days: 30
    
    - name: Coverage Summary
      run: |
        # Extract and display coverage summary
        if [ -f "target/tarpaulin/unit/tarpaulin-report.json" ]; then
          coverage=$(jq -r '.coverage' target/tarpaulin/unit/tarpaulin-report.json 2>/dev/null || echo "0")
          echo "Overall Coverage: ${coverage}%"
          if (( $(echo "$coverage >= 70" | bc -l) )); then
            echo "✅ Coverage meets minimum threshold (70%)"
          else
            echo "⚠️ Coverage below minimum threshold (70%)"
          fi
        fi
